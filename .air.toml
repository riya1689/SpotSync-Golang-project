root = "."
tmp_dir = "tmp"

[build]
  
  cmd = "go build -o ./tmp/main.exe ./cmd/server/main.go"
  
  bin = "tmp\\main.exe"
  
  
  include_ext = ["go", "tpl", "tmpl", "html", "env"]
  
  
  exclude_dir = ["assets", "tmp", "vendor"]
  
  
  stop_on_error = true
  log = "air.log"

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]

  clean_on_exit = true
